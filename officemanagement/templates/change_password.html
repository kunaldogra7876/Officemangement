{% extends "base.html" %}

{% block content %}
<div class="flex justify-center mt-10">
    <div class="w-full max-w-md bg-white rounded-lg shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-slate-800 p-6 text-center">
            <h2 class="text-2xl font-bold text-blue-400">Security Settings</h2>
            <p class="text-gray-300 text-sm mt-1">Change your account password below</p>
        </div>

        <div id="msg-container" class="px-8 pt-4 hidden">
            <div id="msg-box" class="p-3 rounded text-sm font-medium"></div>
        </div>

        <form id="pwForm" class="p-8 space-y-5">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Current Password</label>
                <input type="password" name="old_password" required 
                       class="w-full px-4 py-2 border rounded border-gray-300 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <p id="error-old_password" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <div class="border-t border-gray-100 my-2"></div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">New Password</label>
                <input type="password" name="new_password" required 
                       class="w-full px-4 py-2 border rounded border-gray-300 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <p id="error-new_password" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Confirm New Password</label>
                <input type="password" name="confirm_password" required 
                       class="w-full px-4 py-2 border rounded border-gray-300 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <p id="error-confirm_password" class="text-red-500 text-xs mt-1 hidden"></p>
            </div>

            <button type="submit" id="submitBtn" 
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 disabled:bg-gray-400 transition-all shadow-md">
                Update Password
            </button>
        </form>
    </div>
</div>

<script>
    const form = document.getElementById('pwForm');
    const btn = document.getElementById('submitBtn');
    const msgContainer = document.getElementById('msg-container');
    const msgBox = document.getElementById('msg-box');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Reset UI State
        msgContainer.classList.add('hidden');
        document.querySelectorAll('[id^="error-"]').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('input').forEach(el => el.classList.replace('border-red-500', 'border-gray-300'));

        btn.disabled = true;
        btn.innerHTML = `
            <svg class="animate-spin h-5 w-5 mr-3 inline text-white" viewBox="0 0 24 24"></svg>
            Saving...
        `;

        const formData = new FormData(form);

        try {
            const response = await fetch(window.location.pathname, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': formData.get('csrfmiddlewaretoken'),
                    'Accept': 'application/json' // CRITICAL: Tells DRF to use JSONRenderer
                }
            });

            const data = await response.json();

            if (response.ok) {
                // SUCCESS
                msgContainer.classList.remove('hidden');
                msgBox.className = "p-3 rounded text-sm font-medium bg-green-100 text-green-700 border border-green-200";
                msgBox.innerText = data.message;
                form.reset();
                
                // Optional: Redirect after success
                setTimeout(() => { window.location.href = '/login/'; }, 2500);

            } else {
                // ERROR HANDLING
                btn.disabled = false;
                btn.innerText = "Update Password";

                Object.keys(data).forEach(field => {
                    const input = document.querySelector(`[name="${field}"]`);
                    const errorEl = document.getElementById(`error-${field}`);
                    
                    if (input && errorEl) {
                        input.classList.replace('border-gray-300', 'border-red-500');
                        errorEl.innerText = Array.isArray(data[field]) ? data[field][0] : data[field];
                        errorEl.classList.remove('hidden');
                    } else if (field === 'detail' || field === 'error') {
                        // Handle general system errors
                        msgContainer.classList.remove('hidden');
                        msgBox.className = "p-3 rounded text-sm font-medium bg-red-100 text-red-700 border border-red-200";
                        msgBox.innerText = data[field];
                    }
                });
            }
        } catch (err) {
            btn.disabled = false;
            btn.innerText = "Update Password";
            msgContainer.classList.remove('hidden');
            msgBox.className = "p-3 rounded text-sm font-medium bg-red-100 text-red-700 border border-red-200";
            msgBox.innerText = "Unable to connect to server. Check your internet.";
        }
    });

    // Remove red borders as user starts typing again
    document.querySelectorAll("input").forEach(input => {
        input.addEventListener("input", function() {
            this.classList.replace("border-red-500", "border-gray-300");
            document.getElementById(`error-${this.name}`)?.classList.add("hidden");
        });
    });
</script>
{% endblock %}
