{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-8">
    <h2 class="text-2xl font-bold text-slate-800 mb-6">Manage {{ type|title }}s</h2>
    
    <form method="POST" class="flex gap-2 mb-8">
        {% csrf_token %}
        <input type="text" name="name" placeholder="New {{ type }} name..." required
            class="flex-1 px-4 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 font-bold">Add</button>
    </form>

    <div class="space-y-2">
        <h3 class="font-semibold text-gray-600 uppercase text-xs tracking-wider">Existing {{ type|title }}s</h3>
        {% if type == 'department' %}
            {% for item in departments %}
            <div class="p-3 bg-gray-50 border rounded text-slate-700">{{ item.name }}</div>
            {% endfor %}
        {% else %}
            {% for item in skills %}
            <div class="p-3 bg-gray-50 border rounded text-slate-700">{{ item.name }}</div>
            {% endfor %}
        {% endif %}
    </div>
</div>
{% endblock %}
