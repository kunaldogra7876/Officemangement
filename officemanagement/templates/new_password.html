{% extends "base.html" %}
{% block content %}
<div class="flex justify-center mt-10">
    <div class="bg-white p-8 rounded shadow-xl w-full max-w-md">
        <h2 class="text-xl font-bold text-center mb-4">Set New Password</h2>
        <form id="passForm">
            {% csrf_token %}
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="otp" value="{{ otp }}">

            <div class="mb-4">
                <label class="block text-gray-700 text-sm mb-2">New Password</label>
                <input type="password" name="new_password" required placeholder="Min 8 characters" 
                       class="w-full border p-3 rounded outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <p id="error-pass" class="text-red-500 text-xs mt-2 hidden"></p>

            <button type="submit" id="btn" class="w-full bg-slate-900 text-white py-3 rounded font-bold">
                Update Password
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('passForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true;

        const formData = new FormData(e.target);
        const res = await fetch('/set-new-password/', {
            method: 'POST',
            body: formData,
            headers: { 'X-CSRFToken': formData.get('csrfmiddlewaretoken'), 'Accept': 'application/json' }
        });

        if (res.ok) {
            alert("Success! Password updated.");
            window.location.href = '/login/';
        } else {
            const data = await res.json();
            const err = document.getElementById('error-pass');
            err.innerText = data.new_password ? data.new_password[0] : "Invalid or expired session.";
            err.classList.remove('hidden');
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
