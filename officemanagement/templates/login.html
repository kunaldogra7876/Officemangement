{% extends 'base.html' %}
{% load socialaccount %}
{% block content %}
<div class="flex justify-center items-center mt-10 px-4">
    <div class="w-full max-w-md bg-white rounded-lg shadow-lg overflow-hidden border border-gray-100">
        <div class="bg-slate-800 p-6 text-center">
            <h2 class="text-2xl font-bold text-blue-400">Welcome Back</h2>
            <p class="text-gray-300 text-sm mt-1">Login to your OfficeHub account</p>
        </div>

        {% if messages %}
        <div class="px-8 pt-4">
            {% for message in messages %}
            <div class="p-3 rounded-md text-sm {% if message.tags == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <div id="errorBox" class="hidden px-8 pt-4">
            <div id="errorText" class="p-3 rounded-md text-sm bg-red-100 text-red-700 font-medium text-center"></div>
        </div>

        <form id="loginForm" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input type="email" name="email" id="email" required autocomplete="email"
                   
                    class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none border-gray-300">
            </div>

            <div class="relative">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="password" required autocomplete="current-password"
                        
                        class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none border-gray-300">
                    <span id="togglePassword" 
                          class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-500 hover:text-gray-700 text-lg">
                        ◉
                    </span>
                </div>
            </div>

            <button type="submit" id="submitBtn" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-xl transition-all duration-200 shadow-md transform active:scale-95">
                Sign In
            </button>
        </form>

        <div class="bg-gray-50 p-4 border-t text-center space-y-2">
            <p class="text-gray-600 text-sm">
                <a href="/forgot-password/" class="text-blue-600 font-semibold hover:underline">Forgot Password?</a>
            </p>
        </div>

        <div class="flex items-center my-5">
            <hr class="flex-grow border-gray-300">
            <span class="px-3 text-gray-400 text-xs font-semibold">OR CONTINUE WITH</span>
            <hr class="flex-grow border-gray-300">
        </div>
        <div class = "m-5">
        <a href="{% provider_login_url 'google' %}"
            class="flex items-center justify-center gap-3 w-full border border-gray-300 mb-1 me-1 py-2.5 rounded-xl 
                    hover:bg-gray-100 hover:shadow-md transition-all duration-200 group">

                <img src="https://developers.google.com/identity/images/g-logo.png"
                    class="w-5 h-5 group-hover:scale-110 transition">

                <span class="text-gray-700 font-semibold text-sm">
                    Continue with Google
                </span>
            </a>
        </div>
        
    </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    const submitBtn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');

    togglePassword.addEventListener('click', () => {
        const isPassword = passwordInput.getAttribute('type') === 'password';
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
        togglePassword.textContent = isPassword ? '○' : '◉';
    });

       loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        submitBtn.disabled = true;
        submitBtn.innerText = "Authenticating...";
        errorBox.classList.add('hidden');

        try {
            const response = await fetch(window.location.href, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': formData.get('csrfmiddlewaretoken'),
                    'Accept': 'application/json'
                }
            });

            const data = await response.json();

            if (response.ok) {
                submitBtn.innerText = "Redirecting...";
                
                if (data.redirect) {
                    window.location.href = data.redirect;
                } else {
                    window.location.href = '/profiles/'; 
                }
            } else {
                
                errorBox.classList.remove('hidden');
                errorText.innerText = data.message || "Invalid credentials or pending approval.";
                submitBtn.disabled = false;
                submitBtn.innerText = "Sign In";
            }
        } catch (err) {
            errorBox.classList.remove('hidden');
            errorText.innerText = "Server error. Please try again.";
            submitBtn.disabled = false;
            submitBtn.innerText = "Sign In";
        }
    });
</script>
{% endblock %}
