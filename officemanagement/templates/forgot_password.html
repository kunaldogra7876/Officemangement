{% extends "base.html" %}
{% block content %}
<div class="flex justify-center mt-10">
    <div class="bg-white p-8 rounded shadow-xl w-full max-w-md">
        <h2 class="text-xl font-bold text-center mb-4">Forgot Password</h2>
        <form id="forgotForm">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                <input type="email" name="email" required placeholder="Enter your registered email"
                       class="w-full border p-3 rounded outline-none focus:border-blue-500">
            </div>
            <button type="submit" id="btn" class="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700">
                Send Reset OTP
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.innerText = "Sending...";

        const formData = new FormData(e.target);
        const res = await fetch('/forgot-password/', {
            method: 'POST',
            body: formData,
            headers: { 'X-CSRFToken': formData.get('csrfmiddlewaretoken'), 'Accept': 'application/json' }
        });

        const data = await res.json();
        if (res.ok) {
            window.location.href = data.next_url; 
        } else {
            alert(data.email ? data.email[0] : "Email not found or error occurred.");
            btn.disabled = false;
            btn.innerText = "Send Reset OTP";
        }
    });
</script>
{% endblock %}
