{% extends "base.html" %}

{% block content %}

<div class="bg-white rounded-lg shadow-md p-6">
    <h2 class="text-2xl font-bold text-slate-800 mb-6 border-b pb-2">Pending Approvals</h2>
    <div class="grid gap-4">
        {% for user in pending_users %}
        <div id="user-row-{{ user.id }}" class="flex justify-between items-center p-4 border rounded hover:shadow-sm">
            <div>
                <p class="font-bold text-slate-700">{{ user.username }}</p>
                <p class="text-sm text-gray-500">{{ user.email }}</p>
            </div>
            <button onclick="approveUser({{ user.id }})" class="bg-blue-600 text-white px-4 py-1 rounded hover:bg-blue-700">Approve</button>
        </div>
        {% empty %}
        <p class="text-gray-500 italic">No pending users to approve.</p>
        {% endfor %}
    </div>
</div>

<script>
async function approveUser(userId) {
    const res = await fetch(`/approve/${userId}/`, {
        method: 'POST',
        headers: {'X-CSRFToken': '{{ csrf_token }}', 'Accept': 'application/json'}
    });
    if (res.ok) {
        showMessage("User Approved!", 'success');
        document.getElementById(`user-row-${userId}`).remove();
    }
}
</script>
{% endblock %}
